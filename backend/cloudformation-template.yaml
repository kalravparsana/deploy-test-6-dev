AWSTemplateFormatVersion: '2010-09-09'
Description: deploy-test-6 R1 backend — API Gateway + Lambda + DynamoDB

Parameters:
  ProjectName:
    Type: String
    Default: deploy-test-6
  CorsOrigin:
    Type: String
    Default: '*'
    Description: Allowed CORS origin for API responses
  LambdaS3Key:
    Type: String
    Default: api-handler.zip
    Description: S3 key for the packaged Lambda artifact

Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-app'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-api-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDbAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt AppTable.Arn

  ApiLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-api'
      RetentionInDays: 14

  ApiLambda:
    Type: AWS::Lambda::Function
    DependsOn: ApiLambdaLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt ApiLambdaRole.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref AppTable
          CORS_ORIGIN: !Ref CorsOrigin
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: !Ref LambdaS3Key

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-http-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowMethods:
          - GET
          - PUT
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  ApiLambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiLambda.Arn}/invocations'
      PayloadFormatVersion: '2.0'

  ApiRouteHealth:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /health
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRouteStats:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /stats
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRouteActivities:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /activities
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRouteAnalytics:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /analytics
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRouteProfileGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /settings/profile
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRouteProfilePut:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: PUT /settings/profile
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRoutePreferencesGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: GET /settings/preferences
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiRoutePreferencesPut:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: PUT /settings/preferences
      Target: !Sub 'integrations/${ApiLambdaIntegration}'

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: $default
      AutoDeploy: true

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL — set as VITE_API_BASE_URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
  DynamoDBTableName:
    Description: DynamoDB table name — set as DYNAMODB_TABLE_NAME for seed script
    Value: !Ref AppTable
  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref ApiLambda
  ArtifactsBucketName:
    Description: S3 bucket for Lambda deployment artifacts
    Value: !Ref ArtifactsBucket
  AwsRegion:
    Description: Deployed AWS region
    Value: !Ref AWS::Region
